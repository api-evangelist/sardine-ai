description: Sardine is a San Francisco-based fraud prevention, AML compliance, and risk management platform
  for fintechs, banks, marketplaces, and crypto VASPs. It unifies onboarding (KYC, KYB, document and bank
  verification), device intelligence and behavioral biometrics, payment and card fraud scoring, AML transaction
  monitoring, sanctions screening, and case management into a single risk operating system. Sardine's "agentic"
  layer applies atomic agents (OSINT, data analysis, transaction monitoring, business due diligence, sanctions
  screening) to compress investigation time from days to minutes, while Sonar provides cross-industry fraud
  intelligence across the consortium. The platform serves 400+ enterprise customers including FIS, GoDaddy,
  Intuit, Nubank, Novo, and bunq, has screened $1.3T+ in payments, and profiled 5.4B+ devices. Sardine has
  raised ~$170M from Andreessen Horowitz, Visa, Experian, Google Ventures, FIS, and others. Public docs cover
  the risk landscape and integration overview; full API reference, SDKs, and sandbox access are gated and
  require a Sardine account.
