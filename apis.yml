  description: Submit customer profile and onboarding signals (KYC, KYB, document verification, sanctions/PEP
    screening, identity fraud, synthetic ID detection, behavioral biometrics, device intelligence) and receive a
    real-time risk decision. The Customer API is the primary onboarding surface used by banks, fintechs, crypto
    exchanges, and marketplaces to verify individuals and businesses globally. Full API reference is gated behind
    sandbox access at docs.sardine.ai.
